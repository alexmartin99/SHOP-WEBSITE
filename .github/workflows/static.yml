<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="STAR BATTERY - Premium Automotive & Inverter Battery Dealer with Same Day Delivery">
    <meta name="keywords" content="batteries, automotive, inverter, UPS, Mumbai, Thane">
    <title>STAR BATTERY - WHERE SERVICE DELIVERS</title>
    <style>
        :root {
            --primary: #d50000;
            --secondary: #ffffff;
            --background: #f7f7f7;
            --accent: #333333;
            --light-gray: #f0f0f0;
            --border-gray: #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --success: #4CAF50;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            background: var(--background);
            line-height: 1.6;
        }

        /* HEADER & NAVIGATION */
        header {
            position: sticky;
            top: 0;
            background: var(--secondary);
            box-shadow: var(--shadow);
            z-index: 100;
            padding: 1rem 0;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-top: -0.3rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 0.7rem 1rem;
            border: 2px solid var(--border-gray);
            border-radius: 25px;
            width: 250px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(213, 0, 0, 0.1);
        }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--secondary);
            border: 1px solid var(--border-gray);
            border-top: none;
            border-radius: 0 0 25px 25px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .search-dropdown.active {
            display: block;
        }

        .search-result {
            padding: 1rem;
            border-bottom: 1px solid var(--border-gray);
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-result:hover {
            background: var(--light-gray);
        }

        /* STICKY CART BUTTON */
        .sticky-cart {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: var(--secondary);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: var(--shadow-lg);
            z-index: 99;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .sticky-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 45px rgba(213, 0, 0, 0.3);
        }

        .cart-count {
            background: var(--secondary);
            color: var(--primary);
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #ff4444 100%);
            color: var(--secondary);
            padding: 6rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/></pattern></defs><rect width="1200" height="600" fill="none"/><rect width="1200" height="600" fill="url(%23grid)" /></svg>');
            opacity: 0.1;
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: slideInUp 0.8s ease-out;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .hero-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .feature-item::before {
            content: '✓ ';
            font-weight: bold;
            margin-right: 0.5rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--secondary);
            color: var(--primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: var(--primary);
        }

        /* BRANDS SECTION */
        .section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 1rem;
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--accent);
            font-weight: 900;
            position: relative;
            padding-bottom: 1rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .brand-card {
            background: var(--secondary);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .brand-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .brand-logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .brand-card h3 {
            font-size: 1.3rem;
            color: var(--accent);
        }

        /* FILTERS */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .filter-btn {
            padding: 0.7rem 1.5rem;
            border: 2px solid var(--border-gray);
            background: var(--secondary);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--secondary);
            border-color: var(--primary);
        }

        /* PRODUCTS GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: var(--secondary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: var(--light-gray);
        }

        .product-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-brand {
            display: inline-block;
            background: var(--primary);
            color: var(--secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            width: fit-content;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .product-category {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .product-compatibility {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .price-section {
            background: var(--light-gray);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .price-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .price-line:last-child {
            margin-bottom: 0;
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            border-top: 1px solid var(--border-gray);
            padding-top: 0.5rem;
        }

        .stock-status {
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .stock-in {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stock-out {
            background: #ffebee;
            color: #c62828;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-add-cart {
            flex: 1;
            background: var(--primary);
            color: var(--secondary);
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-add-cart:hover {
            background: #b30000;
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            flex: 1;
            background: #25d366;
            color: var(--secondary);
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-whatsapp:hover {
            background: #1fa855;
            transform: translateY(-2px);
        }

        /* SERVICES SECTION */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: linear-gradient(135deg, var(--primary), #ff4444);
            color: var(--secondary);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .service-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* TRUST SECTION */
        .trust-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .trust-item {
            background: var(--secondary);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .trust-item::before {
            content: '✔';
            display: block;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-weight: bold;
        }

        /* CONTACT SECTION */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .contact-box {
            background: var(--secondary);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            border-top: 4px solid var(--primary);
        }

        .contact-box h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .contact-link {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .contact-link:hover {
            color: var(--primary);
        }

        /* GOOGLE MAP */
        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .map-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--light-gray), var(--border-gray));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            text-align: center;
            padding: 2rem;
        }

        /* FOOTER */
        footer {
            background: var(--accent);
            color: var(--secondary);
            padding: 2rem 1rem;
            text-align: center;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .footer-tagline {
            color: #999;
            margin-bottom: 1rem;
        }

        .footer-copyright {
            color: #666;
            font-size: 0.9rem;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--secondary);
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 2rem;
            background: var(--primary);
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border-gray);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(213, 0, 0, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .required::after {
            content: ' *';
            color: var(--primary);
        }

        /* PRODUCT DETAILS MODAL */
        .product-details-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .product-detail-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            background: var(--light-gray);
        }

        .product-detail-info h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border-gray);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .detail-value {
            color: var(--accent);
            font-weight: 700;
        }

        /* CART PAGE */
        .cart-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .cart-items {
            background: var(--secondary);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr 1fr 100px;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-gray);
            margin-bottom: 1rem;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            background: var(--light-gray);
        }

        .cart-item-details h4 {
            margin-bottom: 0.5rem;
        }

        .cart-item-details p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border-gray);
            border-radius: 5px;
            width: fit-content;
        }

        .quantity-control button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            color: var(--primary);
            font-weight: bold;
        }

        .quantity-control span {
            padding: 0 0.75rem;
            font-weight: 600;
        }

        .cart-remove {
            background: #ffebee;
            color: #c62828;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .cart-remove:hover {
            background: #ffcdd2;
        }

        .cart-summary {
            background: var(--secondary);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .summary-row.total {
            font-size: 1.3rem;
            color: var(--primary);
            border-top: 2px solid var(--border-gray);
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-cart-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* SUCCESS POPUP */
        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--secondary);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .success-popup.active {
            opacity: 1;
            visibility: visible;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .success-popup h2 {
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .success-popup p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero-tagline {
                font-size: 1rem;
            }

            .search-box input {
                width: 150px;
                font-size: 0.9rem;
            }

            .header-actions {
                flex-direction: column;
                width: 100%;
                gap: 0.5rem;
            }

            .product-details-content {
                grid-template-columns: 1fr;
            }

            .cart-section {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
