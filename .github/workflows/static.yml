                stockStatus: "In Stock"
            },
            {
                id: 44,
                name: "POWERZONE TRUCK BATTERY",
                price: 6800,
                scrapValue: 1300,
                category: "HEAVY VEHICLE BATTERIES",
                brand: "POWERZONE",
                vehicleCompatibility: "HEAVY TRUCK",
                image: "https://via.placeholder.com/300x250?text=POWERZONE+TRUCK",
                description: "High performance truck battery",
                stockStatus: "In Stock"
            },
            {
                id: 45,
                name: "EXIDE INDUSTRIAL BATTERY",
                price: 8000,
                scrapValue: 1500,
                category: "HEAVY VEHICLE BATTERIES",
                brand: "EXIDE",
                vehicleCompatibility: "INDUSTRIAL, HEAVY TRUCK",
                image: "https://via.placeholder.com/300x250?text=EXIDE+INDUSTRIAL",
                description: "Industrial grade battery",
                stockStatus: "In Stock"
            }
        ];

        // STATE
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentFilter = 'ALL';
        let searchTerm = '';

        // UTILITY FUNCTIONS
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function scrollToSection(sectionId) {
            const section = document.getElementById(sectionId);
            section?.scrollIntoView({ behavior: 'smooth' });
        }

        function formatCurrency(amount) {
            return '₹' + amount.toLocaleString('en-IN');
        }

        function getFilteredProducts() {
            return productsData.filter(product => {
                const matchesFilter = currentFilter === 'ALL' || product.category === currentFilter || product.brand === currentFilter;
                const matchesSearch = searchTerm === '' || 
                    product.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    product.brand.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    product.vehicleCompatibility.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    product.category.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesFilter && matchesSearch;
            });
        }

        // FILTER FUNCTIONS
        function initializeFilters() {
            const container = document.getElementById('filtersContainer');
            const categories = ['ALL', ...new Set(productsData.map(p => p.category)), ...new Set(productsData.map(p => p.brand))];
            
            container.innerHTML = categories.map(cat => `
                <button class="filter-btn ${cat === 'ALL' ? 'active' : ''}" onclick="setFilter('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === filter);
            });
            renderProducts();
        }

        // PRODUCT RENDERING
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = getFilteredProducts();

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-secondary);">No products found</div>';
                return;
            }

            grid.innerHTML = filtered.map(product => `
                <div class="product-card" onclick="viewProductDetails(${product.id})">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <div class="product-brand">${product.brand}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-category">${product.category}</div>
                        <div class="product-compatibility">For: ${product.vehicleCompatibility}</div>
                        
                        <div class="price-section">
                            <div class="price-line">
                                <span>MRP</span>
                                <span>${formatCurrency(product.price)}</span>
                            </div>
                            <div class="price-line">
                                <span>Scrap</span>
                                <span>${formatCurrency(product.scrapValue)}</span>
                            </div>
                            <div class="price-line">
                                You Pay: ${formatCurrency(product.price - product.scrapValue)}
                            </div>
                        </div>

                        <div class="stock-status ${product.stockStatus === 'In Stock' ? 'stock-in' : 'stock-out'}">
                            ${product.stockStatus}
                        </div>

                        <div class="product-actions">
                            <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${product.id})">ADD TO CART</button>
                            <button class="btn-whatsapp" onclick="event.stopPropagation(); sendWhatsAppEnquiry(${product.id})">WHATSAPP</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // PRODUCT DETAILS
        function viewProductDetails(productId) {
            const product = productsData.find(p => p.id === productId);
            if (!product) return;

            const body = document.getElementById('productModalBody');
            body.innerHTML = `
                <div class="product-details-content">
                    <img src="${product.image}" alt="${product.name}" class="product-detail-image" loading="lazy">
                    <div class="product-detail-info">
                        <h3>${product.name}</h3>
                        <div class="detail-row">
                            <span class="detail-label">Brand</span>
                            <span class="detail-value">${product.brand}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Category</span>
                            <span class="detail-value">${product.category}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Compatible With</span>
                            <span class="detail-value">${product.vehicleCompatibility}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">MRP</span>
                            <span class="detail-value">${formatCurrency(product.price)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Scrap Value</span>
                            <span class="detail-value">${formatCurrency(product.scrapValue)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">You Pay</span>
                            <span class="detail-value" style="font-size: 1.3rem;">${formatCurrency(product.price - product.scrapValue)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Stock</span>
                            <span class="detail-value">${product.stockStatus}</span>
                        </div>
                        <p style="margin-top: 1rem; color: var(--text-secondary);">${product.description}</p>
                        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                            <button class="btn btn-primary" onclick="addToCart(${product.id}); closeProductModal();">Add to Cart</button>
                            <a href="https://wa.me/917045902196?text=Hi%20STAR%20BATTERY%2C%20I%20am%20interested%20in%20${encodeURIComponent(product.name)}" 
                               target="_blank" class="btn btn-secondary" style="flex: 1; text-align: center; text-decoration: none;">WhatsApp Enquiry</a>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('productModal').classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // CART FUNCTIONS
        function addToCart(productId) {
            const product = productsData.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            saveCart();
            updateCartUI();
            showNotification(`${product.name} added to cart!`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCartUI();
        }

        function updateQuantity(productId, quantity) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = Math.max(1, quantity);
                saveCart();
                updateCartUI();
            }
        }

        function clearCart() {
            cart = [];
            saveCart();
            updateCartUI();
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        // SEARCH FUNCTIONS
        const debouncedSearch = debounce(() => {
            const input = document.getElementById('searchInput');
            searchTerm = input.value;
            
            const dropdown = document.getElementById('searchDropdown');
            if (searchTerm.length < 2) {
                dropdown.classList.remove('active');
                renderProducts();
                return;
            }

            const results = getFilteredProducts();
            dropdown.innerHTML = results.slice(0, 8).map(product => `
                <div class="search-result" onclick="selectSearchResult('${product.name}')">
                    <strong>${product.name}</strong><br>
                    <span style="font-size: 0.85rem; color: var(--text-secondary);">${product.brand} - ${product.category}</span>
                </div>
            `).join('');
            
            if (results.length > 0) {
                dropdown.classList.add('active');
            }
            
            renderProducts();
        }, 300);

        document.getElementById('searchInput').addEventListener('input', debouncedSearch);

        function selectSearchResult(productName) {
            document.getElementById('searchInput').value = productName;
            document.getElementById('searchDropdown').classList.remove('active');
            searchTerm = productName;
            renderProducts();
        }

        // CART MODAL
        function openCartModal() {
            const content = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                content.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p>Add some batteries to get started!</p>
                    </div>
                `;
                document.getElementById('cartModal').classList.add('active');
                return;
            }

            let html = '<div class="cart-items">';
            let subtotal = 0;
            let totalScrap = 0;

            cart.forEach(item => {
                const itemPrice = (item.price - item.scrapValue) * item.quantity;
                subtotal += itemPrice;
                totalScrap += item.scrapValue * item.quantity;

                html += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image" loading="lazy">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <p>${item.brand}</p>
                            <p>₹${(item.price - item.scrapValue)} each</p>
                        </div>
                        <div class="quantity-control">
                            <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                        <button class="cart-remove" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `;
            });

            html += '</div>';

            html += `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span>${formatCurrency(subtotal)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Total Savings:</span>
                        <span style="color: var(--success);">${formatCurrency(totalScrap)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Grand Total:</span>
                        <span>${formatCurrency(subtotal)}</span>
                    </div>
                    <button class="btn btn-primary" onclick="openCheckoutModal()" style="width: 100%; margin-bottom: 0.5rem;">Proceed to Checkout</button>
                    <button class="btn btn-secondary" onclick="clearCart(); closeCartModal();" style="width: 100%; margin-bottom: 0.5rem;">Clear Cart</button>
                    <button class="btn btn-secondary" onclick="closeCartModal()" style="width: 100%;">Continue Shopping</button>
                </div>
            `;

            content.innerHTML = html;
            document.getElementById('cartModal').classList.add('active');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.remove('active');
        }

        document.getElementById('stickyCart').addEventListener('click', openCartModal);

        // CHECKOUT FUNCTIONS
        function generateOrderSummary() {
            let summary = '# ================================\nSTAR BATTERY ORDER\n\nCustomer Details\n\n';
            summary += `Name: ${document.getElementById('customerName').value}\n`;
            summary += `Phone: ${document.getElementById('phoneNumber').value}\n`;
            summary += `Address: ${document.getElementById('deliveryAddress').value}\n`;
            summary += `Area: ${document.getElementById('area').value}\n`;
            summary += `Vehicle Number: ${document.getElementById('vehicleNumber').value}\n`;
            summary += `Vehicle Model: ${document.getElementById('vehicleModel').value}\n`;
            summary += `\n---\nItems:\n\n`;

            let total = 0;
            let totalScrap = 0;

            cart.forEach(item => {
                const itemTotal = (item.price - item.scrapValue) * item.quantity;
                total += itemTotal;
                totalScrap += item.scrapValue * item.quantity;
                summary += `${item.name}\nQty: ${item.quantity}\nPrice: ₹${item.price - item.scrapValue}\n\n`;
            });

            summary += `---\nTotal Savings: ₹${totalScrap}\n\nGrand Total: ₹${total}\n\n================================`;
            return summary;
        }

        function openCheckoutModal() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            let html = '<h3>Order Summary</h3>';
            let total = 0;
            let totalScrap = 0;

            cart.forEach(item => {
                const itemTotal = (item.price - item.scrapValue) * item.quantity;
                total += itemTotal;
                totalScrap += item.scrapValue * item.quantity;
                html += `<div style="margin-bottom: 0.5rem;"><strong>${item.name}</strong> x${item.quantity} = ₹${itemTotal}</div>`;
            });

            html += `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-gray);"><strong>Total Savings: ₹${totalScrap}</strong></div>`;
            html += `<div style="font-size: 1.2rem; color: var(--primary); font-weight: bold; margin-top: 0.5rem;">Grand Total: ₹${total}</div>`;

            document.getElementById('cartItemsSummary').innerHTML = html;
            document.getElementById('checkoutModal').classList.add('active');
            closeCartModal();
        }

        function closeCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        function submitCheckout(e) {
            e.preventDefault();

            const summary = generateOrderSummary();
            document.getElementById('orderSummaryField').value = summary;

            // Submit to Formspree
            const formData = new FormData(document.getElementById('checkoutForm'));
            formData.append('order_summary', summary);

            fetch('https://formspree.io/f/xrevvrgo', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    showSuccessPopup();
                    clearCart();
                    closeCheckoutModal();
                    document.getElementById('checkoutForm').reset();
                } else {
                    alert('Error submitting order. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error submitting order. Please try again.');
            });
        }

        // SUCCESS POPUP
        function showSuccessPopup() {
            const popup = document.getElementById('successPopup');
            popup.classList.add('active');
            setTimeout(() => {
                popup.classList.remove('active');
            }, 5000);
        }

        function closeSuccessPopup() {
            document.getElementById('successPopup').classList.remove('active');
        }

        // WHATSAPP FUNCTIONS
        function sendWhatsAppEnquiry(productId) {
            const product = productsData.find(p => p.id === productId);
            if (!product) return;

            const message = `Hi STAR BATTERY, I am interested in ${product.name} (${product.brand}). Compatibility: ${product.vehicleCompatibility}. Please provide more details and pricing.`;
            const whatsappUrl = `https://wa.me/917045902196?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // NOTIFICATIONS
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 1rem;
                background: var(--success);
                color: var(--secondary);
                padding: 1rem 1.5rem;
                border-radius: 8px;
                box-shadow: var(--shadow);
                z-index: 999;
                animation: slideInUp 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideInUp 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // CLOSE MODALS ON BACKGROUND CLICK
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            initializeFilters();
            renderProducts();
            updateCartUI();
        });
    </script>
</body>
</html>

